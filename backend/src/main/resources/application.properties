
# ==========================================
# CONFIGURACIï¿½N DEL SERVIDOR
# ==========================================
server.port=8080
spring.application.name=backend

# ==========================================
# 1. BASE DE DATOS RELACIONAL (MySQL)
# ==========================================
# Aquï¿½ se guardarï¿½n Usuarios, Alquileres e Ingresos
spring.datasource.url=jdbc:mysql://localhost:3306/streamflix_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# 2. BASE DE DATOS NoSQL (MongoDB + GridFS)
# ==========================================
# Aquï¿½ se guardarï¿½n los archivos multimedia (Vï¿½deos y Pï¿½sters)
spring.data.mongodb.uri=mongodb://localhost:27017/streamflix_media
spring.data.mongodb.database=streamflix_media

# Configuraciï¿½n opcional para evitar timeouts en archivos pesados
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB