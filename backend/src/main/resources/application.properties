server.port=8080
spring.application.name=backend

# 1. Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/streamflix_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 2. MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/streamflix_media
spring.data.mongodb.database=streamflix_media

# Multipart config
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# 3. Seguridad JWT
jwt.secret=UnaClaveSuperSecretaParaStreamFlixQueDebeTenerAlMenos256BitsDeLongitud!!
jwt.expiration=24