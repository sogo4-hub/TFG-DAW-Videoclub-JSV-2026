server.port=8080

spring.application.name=backend



spring.datasource.url=jdbc:h2:file:./backend/data/streamflix_db;AUTO_SERVER=TRUE

spring.datasource.driverClassName=org.h2.Driver

spring.datasource.username=sa

spring.datasource.password=sa


# Comentado para que no ejecute el DROP TABLE de schema.sql siempre

#spring.sql.init.mode=always

# Mantenemos update para no perder datos en cada reinicio

spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=true

spring.h2.console.enabled=true

spring.sql.init.encoding=UTF-8

#http://localhost:8080/h2-console

spring.h2.console.path=/h2-console

spring.h2.console.settings.web-allow-others=true


#---------------------------------------------------------------------------------------------



spring.servlet.multipart.max-file-size=500MB

spring.servlet.multipart.max-request-size=500MB


# --- MONGODB CONFIGURATION ---

#spring.data.mongodb.uri=mongodb://localhost:27017/streamflix_media

spring.data.mongodb.uri=${MONGO_URI}

spring.data.mongodb.database=streamflix_media


# --- JWT CONFIGURATION ---

jwt.secret=${JWT_SECRET}

jwt.expiration=24


# --- GOOGLE RECAPTCHA ENTERPRISE ---

google.recaptcha.api-key=${RECAPTCHA_API_KEY}

google.recaptcha.project-id=${RECAPTCHA_PROJECT_ID}

google.recaptcha.site-key=${RECAPTCHA_SITE_KEY}


# --- TMDB CONFIGURATION ---

tmdb.api.key=${TMDB_API_KEY}

tmdb.api.base-url=https://api.themoviedb.org/3

tmdb.api.image-base-url=https://image.tmdb.org/t/p/w500

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE